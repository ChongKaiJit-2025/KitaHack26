<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SisaSifar: AI Powered</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 2px solid #333; padding: 20px; border-radius: 15px; background: #1e1e1e; }
        h1 { color: #00ff9d; text-shadow: 0 0 10px #00ff9d; }
        
        /* Camera Feed Styling */
        .camera-box { 
            width: 100%; height: 300px; background: #000; border: 2px solid #00ff9d; 
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* Button Styling */
        .btn { 
            background: #00ff9d; color: #000; border: none; padding: 15px; width: 100%; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 20px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555; cursor: not-allowed; }

        /* AI Dialogue Box */
        .chat-box { text-align: left; background: #252525; padding: 15px; border-radius: 10px; border-left: 4px solid #00ff9d; min-height: 80px;}
        .ai-label { color: #00ff9d; font-size: 0.8em; margin-bottom: 5px; display: block; }
        .ai-text { font-size: 1.1em; line-height: 1.4; }
        
        /* User Input Area */
        .input-group { display: flex; gap: 10px; margin-top: 15px; } /* Hidden initially */
        input { flex: 1; padding: 10px; border: 1px solid #444; background: #000; color: #fff; border-radius: 5px; }
        .send-btn { background: #fff; color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        /* Inventory List */
        .inventory { margin-top: 30px; text-align: left; }
        .item { padding: 10px; border-bottom: 1px solid #333; color: #ccc; }
        .tag { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SisaSifar <span style="font-size:0.5em">AI CORE</span></h1>

    <div class="camera-box">
        <p id="status_text" style="color:#555;">[ SYSTEM READY ]</p>
        <img id="preview">
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <button class="btn" id="scanBtn" onclick="triggerScan()">INITIATE SCAN</button>

    <div class="chat-box">
        <span class="ai-label">AI GUARDIAN LOG:</span>
        <div id="ai_output" class="ai-text">Waiting for visual input...</div>
    </div>

    <div class="input-group" id="replySection">
        <input type="text" id="userReply" placeholder="Type your answer here...">
        <button class="send-btn" onclick="sendReply()">SEND</button>
    </div>

    <div class="inventory">
        <h3 style="border-bottom: 1px solid #555; padding-bottom: 5px;">LIVE INVENTORY</h3>
        <div id="inventoryList">
            </div>
    </div>
</div>

<script>
    // ================= CONFIGURATION =================
    // ⚠️ PASTE YOUR KEY HERE OR THIS WILL NOT WORK ⚠️
    const API_KEY = "AIzaSyCIpqfncU8hcdwRPCgXpt7EHWiMKYDz0pA"; 
    // =================================================

    const fileInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const statusText = document.getElementById('status_text');
    const aiOutput = document.getElementById('ai_output');
    const replySection = document.getElementById('replySection');
    const scanBtn = document.getElementById('scanBtn');

    // 1. TRIGGER THE FILE SELECTOR
    function triggerScan() {
        fileInput.click();
    }

    // 2. HANDLE FILE SELECTION
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            // Show Image
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                statusText.style.display = 'none';
                
                // Start AI Process
                processImageWithGemini(e.target.result.split(',')[1]); // Send Base64 (remove header)
            }
            reader.readAsDataURL(file);
        }
    });

    // 3. SEND TO GEMINI API
    async function processImageWithGemini(base64Image) {
        // ⚠️ PASTE YOUR NEW KEY HERE
        const CURRENT_KEY = "AIzaSyAe_JNri58WC-RosdBEB2ScznziPCr07zY"; 

        if (CURRENT_KEY === "" || CURRENT_KEY.includes("PASTE")) {
            alert("⚠️ ERROR: You need to paste your API Key in the code!");
            return;
        }

        // UI Updates
        aiOutput.innerText = "Connecting to Gemini...";
        aiOutput.style.color = "yellow";
        scanBtn.disabled = true;
        scanBtn.innerText = "PROCESSING...";

        const prompt = `
            Role: You are SisaSifar, a strict AI Kitchen Guardian.
            Task: Analyze this food image.
            1. If you see items, list them.
            2. If ambiguous, ASK the user.
            3. Keep it SHORT (Max 2 sentences).
        `;

        try {
            // FIX: Using the stable 'gemini-2.5-flash' model name
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${CURRENT_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            // ERROR HANDLING
            if (data.error) {
                console.error("FULL ERROR DETAILS:", data); // Check Console (F12) if this happens
                aiOutput.innerText = "API Error: " + data.error.message;
                aiOutput.style.color = "red";
                return;
            }

            // SUCCESS
            if (data.candidates && data.candidates.length > 0) {
                const aiText = data.candidates[0].content.parts[0].text;
                aiOutput.innerText = aiText;
                aiOutput.style.color = "#00ff9d";
                speak(aiText);
                
                if (aiText.includes("?")) {
                    replySection.style.display = "flex";
                } else {
                    addToInventory(aiText);
                }
            } else {
                aiOutput.innerText = "The AI saw nothing. Try a different image.";
            }

        } catch (error) {
            console.error(error);
            aiOutput.innerText = "Network Error: " + error.message;
            aiOutput.style.color = "red";
        } finally {
            scanBtn.disabled = false;
            scanBtn.innerText = "INITIATE SCAN";
        }
    }

    // 4. HANDLE USER REPLY
    function sendReply() {
        const text = document.getElementById('userReply').value;
        if (!text) return;

        // Simulate AI Acknowledgment
        const response = `Understood. Logged '${text}' with a 3-day expiry reminder.`;
        aiOutput.innerText = response;
        speak(response);
        
        addToInventory(text);
        
        // Reset UI
        replySection.style.display = "none";
        document.getElementById('userReply').value = "";
    }

    // 5. HELPER FUNCTIONS
    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
    }

    function addToInventory(itemText) {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `✅ ${itemText.substring(0, 30)}... <span class="tag">Just Now</span>`;
        document.getElementById('inventoryList').prepend(div);
    }
</script>

</body>
</html>
