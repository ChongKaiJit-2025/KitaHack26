<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Guardian: Your 24h Stomach Concierge</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #333; padding: 30px; border-radius: 20px; background: #161616; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00ff9d; margin-bottom: 5px; letter-spacing: 1px; }
        .tagline { color: #888; font-size: 0.9em; margin-bottom: 20px; }
        
        .camera-box { 
            width: 100%; height: 280px; background: #000; border: 2px solid #333; 
            margin: 20px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 15px;
        }
        img { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        /* Action Buttons */
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        button { 
            flex: 1; background: #00ff9d; color: #000; border: none; padding: 15px; 
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 10px;
        }
        .mic-btn { background: #fff; width: 60px; flex: 0; font-size: 20px; }

        /* Reply Section (Typing) */
        .reply-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .reply-input { flex: 1; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .send-btn { width: 80px; flex: 0; background: #444; color: #fff; }

        .chat-box { text-align: left; background: #222; padding: 20px; border-radius: 12px; border-left: 5px solid #00ff9d; min-height: 60px; margin-bottom: 20px; }
        .status-label { color: #00ff9d; font-size: 0.7em; font-weight: bold; margin-bottom: 8px; display: block; }
        
        .inventory-list { text-align: left; border-top: 1px solid #333; padding-top: 20px; }
        .inv-item { padding: 12px; background: #252525; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        
        .stats-bar { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: #00ff9d11; border-radius: 10px; border: 1px solid #00ff9d33; }
        .stat-val { color: #00ff9d; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>FOOD <span style="font-weight: 300;">GUARDIAN</span></h1>
    <div class="tagline">Your 24-Hour Stomach Concierge</div>

    <div class="camera-box">
        <p id="placeholder" style="color:#444">[ SCANNER STANDBY ]</p>
        <img id="preview">
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display:none">
    
    <div class="action-btns">
        <button onclick="document.getElementById('imageInput').click()">📸 SCAN FOOD</button>
        <button class="mic-btn" onclick="startListening()">🎤</button>
    </div>

    <div class="reply-group">
        <input type="text" id="typeInput" class="reply-input" placeholder="Type your reply to the Concierge...">
        <button class="send-btn" onclick="sendReply()">SEND</button>
    </div>

    <div class="chat-box">
        <span class="status-label">CONCIERGE FEEDBACK:</span>
        <div id="ai_output">Scan food or type/speak to start chatting.</div>
    </div>

    <div class="inventory-list">
        <div style="color: #00ff9d; font-size: 0.8em; margin-bottom: 10px; font-weight: bold;">LIVE LOG:</div>
        <div id="listItems"></div>
    </div>

    <div class="stats-bar">
        <div><div class="stat-val" id="savedCount">0</div><small>Items Saved</small></div>
        <div><div class="stat-val" id="wastePrevented">0kg</div><small>Waste Prevented</small></div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const API_KEY = "Your Google API Key Here"; 
    
    let inventory = [];
    let currentImage = "";
    let recognition;

    // --- 2. VOICE SETUP ---
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.onresult = (e) => sendToGemini(e.results[0][0].transcript);
    }

    function startListening() {
        if (recognition) recognition.start();
        document.getElementById('ai_output').innerText = "Listening...";
    }

    // --- 3. TYPING SETUP ---
    function sendReply() {
        const text = document.getElementById('typeInput').value;
        if(text) {
            sendToGemini(text);
            document.getElementById('typeInput').value = "";
        }
    }

    // --- 4. IMAGE SETUP ---
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('preview').src = event.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                currentImage = event.target.result.split(',')[1];
                sendToGemini("Initial Scan: Identify food, check freshness, and estimate expiry.");
            };
            reader.readAsDataURL(file);
        }
    });

    // --- 5. AI LOGIC ---
    async function sendToGemini(userInput) {
        const output = document.getElementById('ai_output');
        output.innerText = "Processing...";

        const prompt = `
            Role: Food Guardian (Stomach Concierge). 
            Task: Analyze image and text. 
            1. If unsafe/spoiled, warn. 
            2. If user confirms item, end ONLY the final sentence with: DATA|ItemName|ExpiryHours|Status
            Status should be 'Safe', 'Eat Soon', or 'Spoiled'.
            Remember to give short and simple replies for user confirmation, and a few suggestions are okkay, just dont format it because it will literally sing out every single marks.
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt + "\nUser: " + userInput }, { inline_data: { mime_type: "image/jpeg", data: currentImage } }] }]
                })
            });

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            
            const parts = text.split("DATA|");
            output.innerText = parts[0];
            speak(parts[0]);

            if (parts.length > 1) {
                const [name, hours, status] = parts[1].split("|");
                addToDatabase(name, hours, status);
            }
        } catch (e) { output.innerText = "Error connecting to AI."; }
    }

    // --- 6. DATABASE & UI ---
    function addToDatabase(name, hours, status) {
        const item = {
            name: name.trim(),
            entryTime: new Date(),
            expiry: new Date(Date.now() + (parseInt(hours) * 3600000)),
            status: status.trim()
        };
        inventory.push(item);
        refreshUI();
    }

    function refreshUI() {
        const list = document.getElementById('listItems');
        list.innerHTML = "";
        let totalWaste = 0;

        inventory.forEach(item => {
            const hoursLeft = Math.round((item.expiry - new Date()) / 3600000);
            let color = hoursLeft < 12 ? "orange" : "#00ff9d";
            if (hoursLeft <= 0) color = "red";

            list.innerHTML += `
                <div class="inv-item">
                    <div><strong>${item.name}</strong><br><small>Stomach Window: ${hoursLeft}h left</small></div>
                    <b style="color:${color}">${hoursLeft <= 0 ? 'DANGER' : item.status}</b>
                </div>`;
            totalWaste += 0.5; 
        });

        document.getElementById('savedCount').innerText = inventory.length;
        document.getElementById('wastePrevented').innerText = totalWaste.toFixed(1) + "kg";
    }

    function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
</script>
</body>
</html>
